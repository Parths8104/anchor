services:
  anchor:
    build: .
    image: anchor:latest
    container_name: anchor-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - anchor-data:/app/.chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  anchor-data:
